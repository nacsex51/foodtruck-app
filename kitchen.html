<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konyha – Rendelések</title>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0f" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Egységes SVG ikon-készlet (emoji helyett) -->
  <script src="icons.js"></script>

  <!-- Betűtípusok: Outfit (kiemelések, számok) + Rubik (törzsszöveg, gombok) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       DIZÁJN TOKENEK – ugyanaz az alap-paletta, mint a pénztár
       oldalon, de arany-borostyán "identitás-színnel", hogy a
       két tablet első pillantásra megkülönböztethető legyen.
    ============================================================ */
    :root {
      --bg: #0a0a0f;
      --bg-elevated: #14141c;
      --bg-elevated-2: #1c1c26;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #f5f5f7;
      --text-muted: #9a9aac;
      --text-faint: #5c5c6e;

      --primary: #ffb020;          /* Arany-borostyán – Konyha azonosító szín */
      --primary-hover: #ffc65c;
      --primary-soft: rgba(255, 176, 32, 0.14);

      --urgent: #ef4444;           /* ÚJ rendelés figyelemfelhívó szín */
      --urgent-soft: rgba(239, 68, 68, 0.14);
      --success: #2ecc71;
      --success-strong: #22b263;

      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 9px;
      --shadow-card: 0 6px 24px rgba(0, 0, 0, 0.35);

      --font-display: 'Outfit', 'Segoe UI', sans-serif;
      --font-body: 'Rubik', 'Segoe UI', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(180deg, #121218 0%, #08080c 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
    }

    button {
      font-family: inherit;
    }

    /* ============================================================
       FEJLÉC
    ============================================================ */
    /* min-height: rögzített érték, hogy a Konyha és a Pénztár oldal
       fejléce pontosan azonos magasságú legyen. */
    header {
      background: var(--bg-elevated);
      padding: 10px 20px;
      min-height: 65px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
    }

    header h1 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    /* Aktív (ÚJ) rendelések száma */
    .new-count {
      font-family: var(--font-display);
      background: var(--primary-soft);
      color: var(--primary-hover);
      border: 1px solid var(--primary);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ============================================================
       RENDELÉSEK RÁCS ELRENDEZÉSE
       Tablet-en több rendelés fér el egymás mellett.
       auto-fill → automatikusan annyi oszlop amennyi elfér
       minmax(280px, 1fr) → minimum 280px, maximum egyenlő rész
    ============================================================ */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      padding: 16px;
    }

    /* ============================================================
       RENDELÉS KÁRTYA
    ============================================================ */
    .order-card {
        background: var(--bg-elevated);
        border-radius: var(--radius-lg);
        padding: 16px;
        border: 1px solid var(--urgent);
        box-shadow: var(--shadow-card);
        transition: all 0.3s;
        position: relative;
        display: flex;
        flex-direction: column;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }

    /* ÚJ rendelés: pulzáló animáció hogy feltűnő legyen */
    .order-card.new-order {
      animation: pulse-border 2s ease-in-out infinite;
    }

    /* @keyframes: definiálja az animációt
       A keret szín váltakozik a figyelemfelhívó szín két árnyalata között */
    @keyframes pulse-border {
      0%, 100% { border-color: var(--urgent); }
      50%       { border-color: rgba(239, 68, 68, 0.4); }
    }

    /* KÉSZ rendelés: zöld, nem pulzál */
    .order-card.done {
      border-color: var(--success);
      animation: none;
      opacity: 0.55;
    }

    /* Kártya fejléc: sorszám + időbélyeg */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .queue-number {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--urgent);
      line-height: 1;
    }

    .order-card.done .queue-number {
      color: var(--success);
    }

    /* Mikor érkezett a rendelés */
    .order-time {
      font-size: 0.75rem;
      color: var(--text-faint);
      text-align: right;
    }

    .order-time-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 700;
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Szeparátor vonal */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* ============================================================
       ÉTEL SOROK A KÁRTYÁN
       A szakácsnak nagyobb betűvel, hogy távolabbról is olvasható legyen.
    ============================================================ */
    .item-row {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .item-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    /* Mennyiség – nagy és jól látható */
    .item-qty {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--primary);        /* Arany = mennyiség */
      min-width: 36px;
    }

    /* Étel neve */
    .item-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Megjegyzés – kiemelt, jól látható */
    .item-note {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 4px;
        padding-left: 44px;
        color: var(--primary-hover);
        font-size: 1.15rem;
        font-style: italic;
    }

    /* ============================================================
       KÉSZ GOMB
       Ez a gomb a legfontosabb a szakácsnak!
       Nagy, zöld, könnyen megnyomható.
    ============================================================ */
    .done-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--success-strong);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      margin-top: auto;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }

    .done-btn:hover { background: var(--success); }

    /* Ha a rendelés már kész, más gomb jelenik meg */
    .undo-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--bg-elevated-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 10px;
      cursor: pointer;
      margin-top: auto;
      transition: all 0.2s;
    }

    .undo-btn:hover {
      border-color: var(--primary);
      color: var(--primary-hover);
    }

    /* Ha nincs rendelés */
    .empty-state {
      grid-column: 1 / -1;   /* Teljes szélességű */
      text-align: center;
      color: var(--text-faint);
      padding: 80px 20px;
      font-size: 1rem;
    }

    .empty-state .icon {
      margin-bottom: 14px;
      display: flex;
      justify-content: center;
      color: var(--text-faint);
    }

    /* ============================================================
       HANGJELZÉS GOMB (a felhasználónak kell egyszer megnyomni)

       MIÉRT KELL EZ?
       A böngészők biztonsági okokból nem engedik a hanglejátszást
       addig, amíg a felhasználó nem érintett meg valamit az oldalon.
       Ez az "aktiváló" gomb oldja meg ezt a problémát.
    ============================================================ */
    .sound-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 50px;
      color: var(--text-muted);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 0.8rem;
      z-index: 50;
      box-shadow: var(--shadow-card);
      transition: all 0.2s;
    }

    .sound-toggle.active {
      background: rgba(46, 204, 113, 0.14);
      border-color: var(--success);
      color: var(--success);
    }

    /* Új rendelés értesítés banner */
    .notification-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: fixed;
      top: 65px;
      left: 0;
      right: 0;
      background: var(--urgent);
      color: white;
      text-align: center;
      padding: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      z-index: 90;
      animation: slide-down 0.3s ease;
    }

    @keyframes slide-down {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- FEJLÉC -->
  <header>
    <div class="header-title">
      <span data-icon="flame" data-icon-size="20"></span>
      <h1>KONYHA</h1>
    </div>
    <span class="new-count" id="newCount">0 új</span>
  </header>

  <!-- ÚJ RENDELÉS ÉRTESÍTÉS SÁV -->
  <div class="notification-bar" id="notifBar">
    <span data-icon="bell" data-icon-size="16"></span> Új rendelés érkezett!
  </div>

  <!-- RENDELÉSEK RÁCS -->
  <div class="orders-grid" id="ordersGrid">
    <div class="empty-state">
      <div class="icon" data-icon="plate" data-icon-size="40"></div>
      <p>Még nincs rendelés.</p>
    </div>
  </div>

  <!-- HANGJELZÉS AKTIVÁLÓ GOMB -->
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">
    <span data-icon="speakerOff" data-icon-size="16"></span> Hangjelzés ki
  </button>


  <script src="firebase-config.js"></script>
  <script>
    // ============================================================
    // ÁLLAPOT VÁLTOZÓK
    // ============================================================

    let orders = {};             // Beérkező rendelések Firebase-ből
    let soundEnabled = false;    // Hangjelzés be/ki
    let knownOrderIds = new Set(); // Már ismert rendelés ID-k (hanghoz kell)
    let audioCtx = null;         // Web Audio API kontextus


    // ============================================================
    // HANGJELZÉS
    //
    // A Web Audio API segítségével programozottan generálunk hangot,
    // nem kell hangfájl. Az OscillatorNode egy hullámot generál,
    // a GainNode a hangerőt szabályozza.
    // ============================================================
    function toggleSound() {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById("soundToggle");

      if (soundEnabled) {
        // AudioContext létrehozása (csak kattintás után engedélyezett a böngészők által)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        btn.innerHTML = '<span data-icon="speakerWave" data-icon-size="16"></span> Hangjelzés be';
        btn.classList.add("active");
        hydrateIcons(btn);

        // Egy teszt hang lejátszása, hogy a felhasználó tudja hogy működik
        playBeep();
      } else {
        btn.innerHTML = '<span data-icon="speakerOff" data-icon-size="16"></span> Hangjelzés ki';
        btn.classList.remove("active");
        hydrateIcons(btn);
      }
    }

    function playBeep() {
      if (!soundEnabled || !audioCtx) return;

      // OscillatorNode: hanghullám generátor
      const oscillator = audioCtx.createOscillator();
      // GainNode: hangerő (0 = néma, 1 = teljes)
      const gainNode = audioCtx.createGain();

      // Kapcsoljuk össze: oscillator → gain → hangszóró
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      // Hang beállításai
      oscillator.type = "sine";          // Szinusz hullám (lágy hang)
      oscillator.frequency.value = 880;  // 880 Hz = A5 hang (kellemes csipogó)
      gainNode.gain.value = 0.4;         // 40%-os hangerő

      // Hang lejátszása: most-tól most+0.2 másodpercig
      const now = audioCtx.currentTime;
      oscillator.start(now);
      oscillator.stop(now + 0.2);  // 200 milliszekundum

      // Kicsi szünet, majd egy második csipogás
      setTimeout(() => {
        if (!soundEnabled || !audioCtx) return;
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        osc2.type = "sine";
        osc2.frequency.value = 1100;  // Magasabb hang a második csipogáshoz
        gain2.gain.value = 0.4;
        const t = audioCtx.currentTime;
        osc2.start(t);
        osc2.stop(t + 0.2);
      }, 300);  // 300ms szünet a két csipogás között
    }


    // ============================================================
    // RENDELÉS IDŐ FORMÁZÁSA
    // timestamp: milliszekundum (pl. 1718000000000)
    // Visszaad: "14:32" formátumú szöveget
    // ============================================================
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const h = String(date.getHours()).padStart(2, "0");    // pl. "09"
      const m = String(date.getMinutes()).padStart(2, "0");  // pl. "05"
      return `${h}:${m}`;
    }


    // ============================================================
    // RENDELÉSEK MEGJELENÍTÉSE
    // ============================================================
    function renderOrders() {
      const container = document.getElementById("ordersGrid");

      const orderKeys = Object.keys(orders);

      // Új rendelések száma (status === "new")
      const newOrders = orderKeys.filter(id => orders[id].status === "new");
      document.getElementById("newCount").textContent = newOrders.length + " új";

      if (orderKeys.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon" data-icon="plate" data-icon-size="40"></div>
            <p>Még nincs rendelés.</p>
          </div>
        `;
        hydrateIcons();
        return;
      }

      // Rendezés: ÚJ rendelések elöl, azon belül legrégebbi először
      // (hogy a szakács sorban tudja őket elkészíteni)
      orderKeys.sort((a, b) => {
        const aNew = orders[a].status === "new";
        const bNew = orders[b].status === "new";
        if (aNew && !bNew) return -1;   // a előre
        if (!aNew && bNew) return 1;    // b előre
        return orders[a].timestamp - orders[b].timestamp;  // régebbi előre
      });

      container.innerHTML = orderKeys.map(id => {
        const order = orders[id];
        const isDone = order.status === "done";

        return `
          <div class="order-card ${isDone ? 'done' : 'new-order'}">
            <div class="card-header">
              <div class="queue-number">#${order.queue}</div>
              <div class="order-time">
                ${formatTime(order.timestamp)}
                <div class="order-time-status" style="color:${isDone ? 'var(--success)' : 'var(--urgent)'};">
                  ${isDone ? icon('checkCircle', 14) + ' KÉSZ' : '<span class="status-dot"></span> ÚJ'}
                </div>
              </div>
            </div>

            <hr class="divider" />

            <!-- Étel sorok -->
            ${order.items.map(item => `
              <div class="item-row">
                <div class="item-main">
                  <span class="item-qty">${item.qty}×</span>
                  <span class="item-name">${item.name}</span>
                </div>
                ${item.note
                  ? `<div class="item-note">${icon('pencil', 16)} ${item.note}</div>`
                  : ''
                }
              </div>
            `).join("")}

            <!-- Kész / Visszaállít gomb -->
            ${isDone
              ? `<button class="undo-btn" onclick="setStatus('${id}', 'new')">
                   <span data-icon="undo" data-icon-size="16"></span> Visszaállítás újra
                 </button>`
              : `<button class="done-btn" onclick="setStatus('${id}', 'done')">
                   <span data-icon="checkCircle" data-icon-size="18"></span> KÉSZ
                 </button>`
            }
          </div>
        `;
      }).join("");

      hydrateIcons();
    }


    // ============================================================
    // ÁLLAPOT VÁLTOZTATÁSA (Új ↔ Kész)
    // orderId: a rendelés Firebase azonosítója
    // newStatus: "new" vagy "done"
    //
    // update() → csak a megadott mezőket frissíti, a többit meghagyja
    // ============================================================
    function setStatus(orderId, newStatus) {
      ordersRef.child(orderId).update({ status: newStatus });

      // Napi statisztika "teljesített" számlálójának frissítése.
      // Ez a pénztáros oldali statisztika modalban jelenik meg, és
      // független attól, hogy a rendelést később törlik-e.
      statsRef.update({
        doneCount: firebase.database.ServerValue.increment(newStatus === "done" ? 1 : -1)
      });
    }


    // ============================================================
    // ÉRTESÍTŐ SÁV MEGJELENÍTÉSE
    // ============================================================
    function showNotification() {
      const bar = document.getElementById("notifBar");
      bar.style.display = "flex";

      // 3 másodperc után automatikusan eltűnik
      setTimeout(() => {
        bar.style.display = "none";
      }, 3000);
    }


    // ============================================================
    // VALÓS IDEJŰ SZINKRON
    //
    // Ugyanúgy mint a pénztáros oldalon, folyamatosan figyeli
    // az adatbázist. Ha változás van, automatikusan frissül a nézet.
    //
    // ITT TÖRTÉNIK A HANGJELZÉS LOGIKÁJA:
    // - Az első betöltésnél eltároljuk az összes rendelés ID-ját
    // - Minden következő frissítésnél megnézzük, van-e ÚJ ID
    // - Ha igen → hangjelzés + értesítő sáv
    // ============================================================
    let isFirstLoad = true;  // Az első betöltésnél ne szóljon

    // A listenert csak a névtelen bejelentkezés sikeres létrejötte után
    // kapcsoljuk be – a security rules hitelesítést követelnek meg, enélkül
    // a lekérdezés "permission denied" hibával elutasítódna.
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) return;

      ordersRef.on("value", (snapshot) => {
        const newData = snapshot.val() || {};

        if (isFirstLoad) {
          // Első betöltés: csak eltároljuk az ID-kat, nem szólunk
          Object.keys(newData).forEach(id => knownOrderIds.add(id));
          isFirstLoad = false;
        } else {
          // Következő frissítések: keresünk új rendeléseket
          const incomingIds = Object.keys(newData);
          const hasNewOrder = incomingIds.some(id => !knownOrderIds.has(id));

          if (hasNewOrder) {
            // Van új rendelés!
            incomingIds.forEach(id => knownOrderIds.add(id));
            playBeep();           // Hangjelzés
            showNotification();   // Értesítő sáv
          }
        }

        orders = newData;
        renderOrders();
      });
    });

    hydrateIcons();  // Statikus fejléc/gomb ikonok kirajzolása
  </script>
</body>
</html>
