<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konyha – Rendelések</title>

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Web App Manifest: ettől tudja a Chrome appként telepíteni
       (kezdőképernyőre téve keresősáv NÉLKÜL, teljes képernyőn nyílik) -->
  <link rel="manifest" href="manifest-konyha.webmanifest" />

  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-database-compat.js"></script>
  <!-- App Check: az adatbázist csak a saját oldalunk érheti el.
       Csak akkor aktív, ha a firebase-config.js-ben ki van töltve
       a site key (lásd INDULAS_TEENDOK.md) – addig nem csinál semmit. -->
  <script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-check-compat.js"></script>

  <!-- Egységes SVG ikon-készlet (emoji helyett) -->
  <script src="icons.js"></script>

  <!-- Betűtípusok: Outfit (kiemelések, számok) + Rubik (törzsszöveg,
       gombok) – SAJÁT tárhelyről (fonts/ mappa), nem a Google CDN-ről,
       így nincs külső függés és gyenge neten is gyorsan betölt. -->
  <link rel="stylesheet" href="fonts.css" />

  <!-- Stílusok külön fájlban: kitchen.css (tartalomjegyzék a fájl elején) -->
  <link rel="stylesheet" href="kitchen.css?v=2" />
  <!-- Kapcsolat-őr stílusok (közösek a pénztár oldallal): piros
       figyelmeztető sáv + felugró értesítések (toast) -->
  <link rel="stylesheet" href="connection.css" />
  <!-- Bejelentkező képernyő stílusok (közösek a pénztár oldallal) -->
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- FEJLÉC -->
  <header>
    <div class="header-title">
      <span data-icon="flame" data-icon-size="20"></span>
      <h1>KONYHA</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="new-count" id="newCount">0 új</span>
      <!-- Kijelentkezés: utána a belépő képernyő jelenik meg -->
      <button class="logout-btn" onclick="signOutAndReload()" title="Kijelentkezés" aria-label="Kijelentkezés">
        <span data-icon="lock" data-icon-size="15"></span> Kijelentkezés
      </button>
    </div>
  </header>

  <!-- ÚJ RENDELÉS ÉRTESÍTÉS SÁV -->
  <div class="notification-bar" id="notifBar">
    <span data-icon="bell" data-icon-size="16"></span> Új rendelés érkezett!
  </div>

  <!-- RENDELÉSEK RÁCS -->
  <div class="orders-grid" id="ordersGrid">
    <div class="empty-state">
      <div class="icon" data-icon="plate" data-icon-size="40"></div>
      <p>Még nincs rendelés.</p>
    </div>
  </div>

  <!-- HANGJELZÉS AKTIVÁLÓ GOMB -->
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">
    <span data-icon="speakerOff" data-icon-size="16"></span> Hangjelzés ki
  </button>


  <script src="firebase-config.js"></script>
  <!-- Kapcsolat-őr + felugró értesítések (közös a pénztár oldallal) -->
  <script src="connection.js"></script>
  <!-- Bejelentkező képernyő (közös a pénztár oldallal) -->
  <script src="auth.js?v=2"></script>
  <script src="kitchen.js"></script>
</body>
</html>
