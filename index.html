<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pénztár – Rendelésfelvitel</title>

    <!--
      PWA beállítások: ezek teszik lehetővé, hogy a böngészőből
      "telepítsük" az alkalmazást, és teljes képernyőn fusson.
    -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a0f" />

    <!--
      Firebase SDK betöltése (a Google szervereiről)
      Ez a három sor tölti be a Firebase könyvtárakat,
      amik nélkül nem tudna szinkronizálni a két tablet.
    -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Egységes SVG ikon-készlet (emoji helyett) -->
    <script src="icons.js"></script>

    <!-- Betűtípusok: Outfit (kiemelések, számok, árak) + Rubik (törzsszöveg, gombok) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           DIZÁJN TOKENEK – minden szín/radius/betű innen ered, hogy
           a Pénztár és a Konyha oldal vizuálisan egységes maradjon,
           miközben a saját "identitás-színük" (parázs / arany) eltér.
        ============================================================ */
        :root {
            --bg: #0a0a0f;
            --bg-elevated: #14141c;
            --bg-elevated-2: #1c1c26;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.16);
            --text: #f5f5f7;
            --text-muted: #9a9aac;
            --text-faint: #5c5c6e;

            --primary: #d93a16;         /* Parázs narancs-piros – Pénztár azonosító szín (WCAG AA fehér szöveggel) */
            --primary-hover: #ff5a36;
            --primary-soft: rgba(217, 58, 22, 0.16);
            --on-primary: #ffffff;

            --gold: #ffb020;            /* Ár-kiemelés – "étvágygerjesztő" arany */
            --success: #2ecc71;
            --success-strong: #22b263;
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.14);

            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 9px;
            --shadow-card: 0 6px 24px rgba(0, 0, 0, 0.35);

            --font-display: 'Outfit', 'Segoe UI', sans-serif;
            --font-body: 'Rubik', 'Segoe UI', sans-serif;
        }

        /* ============================================================
           ALAP STÍLUSOK
           A * minden HTML elemre vonatkozik.
           box-sizing: border-box → a padding beleszámít az elemek méretébe
        ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(180deg, #121218 0%, #08080c 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
        }

        button, input, textarea {
            font-family: inherit;
        }

        /* Fejléc sáv tetején
           min-height: rögzített érték, hogy a Pénztár és a Konyha oldal
           fejléce pontosan azonos magasságú legyen, függetlenül attól,
           hogy melyiken van ikon-gomb és melyiken nincs. */
        header {
            background: var(--bg-elevated);
            padding: 10px 20px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;      /* Görgetésnél is látható marad */
            top: 0;
            z-index: 100;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Az aktív rendelések száma a fejlécben */
        .order-count {
            font-family: var(--font-display);
            background: var(--primary-soft);
            color: var(--primary-hover);
            border: 1px solid var(--primary);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        /* Ikon-only gomb (pl. Beállítások a fejlécben)
           44×44px – ez adja meg a fejléc pontos, mindkét oldalon
           azonos magasságát (lásd header { min-height }). */
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--bg-elevated-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .icon-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        /* ============================================================
           FŐ ELRENDEZÉS: bal oldal (felvitel) + jobb oldal (lista)
           display: flex → egymás mellé rakja a két panelt
        ============================================================ */
        .main-layout {
            display: flex;
            height: calc(100vh - 65px);  /* Teljes magasság mínusz fejléc */
        }

        /* Bal panel: rendelés összerakása */
        .left-panel {
            width: 55%;
            padding: 16px;
            overflow-y: auto;       /* Görgethetővé teszi ha sok az étel */
            border-right: 1px solid var(--border);
        }

        /* Jobb panel: aktív rendelések listája */
        .right-panel {
            width: 45%;
            padding: 16px;
            overflow-y: auto;
        }

        /* ============================================================
           PAGER GOMBOK (sorszám választó)
        ============================================================ */
        .order-header {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 14px;
        }

        .order-header label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* 8 oszlopos rács a 16 pager gombhoz */
        .pager-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }

        /* Egy pager gomb */
        .pager-btn {
            font-family: var(--font-display);
            background: var(--bg-elevated-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 4px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .pager-btn:hover {
            border-color: var(--primary);
            color: var(--primary-hover);
        }

        /* Kiválasztott pager gomb - kiemelve */
        .pager-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--on-primary);
        }

        /* Foglalt pager gomb - szürke, nem kattintható
           opacity: 0.4 → áttetsző, hogy látszódjon hogy nem elérhető
           cursor: not-allowed → tiltott kurzor ráhúzáskor */
        .pager-btn.occupied {
            background: transparent;
            border-color: var(--border);
            color: var(--text-faint);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .pager-btn.occupied:hover {
            border-color: var(--border);
            color: var(--text-faint);
        }

        /* Kiválasztott sorszám megjelenítése */
        .selected-queue {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        .selected-queue span {
            font-family: var(--font-display);
            color: var(--primary-hover);
            font-weight: 700;
            font-size: 1rem;
        }

        /* ============================================================
           ÉTEL KATEGÓRIÁK ÉS GOMBOK
        ============================================================ */
        .category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin: 16px 0 8px;
        }

        /* Az ételek gombjai - rács elrendezésben */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);  /* 2 oszlopos rács */
            gap: 8px;
            margin-bottom: 10px;
        }

        /* Egy étel gomb */
        .menu-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            padding: 12px 8px;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;        /* Kézzel mutató egér kurzor */
            transition: all 0.15s;  /* Sima átmenet kattintáskor */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .menu-btn-price {
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--gold);
        }

        .menu-btn.in-cart .menu-btn-price {
            color: var(--on-primary);
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background: var(--bg-elevated-2);
        }

        /* Ha az étel már a kosárban van, kiemelve jelenik meg */
        .menu-btn.in-cart {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--on-primary);
        }

        /* ============================================================
           KOSÁR (az összerakott rendelés)
        ============================================================ */
        .cart-section {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-top: 14px;
        }

        .cart-section h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--primary-hover);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Egy kosár tétel */
        .cart-item {
            background: var(--bg-elevated-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px;
            margin-bottom: 8px;
        }

        .cart-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .cart-item-price {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .cart-item-line-total {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--gold);
            font-size: 0.85rem;
        }

        /* Végösszeg a kosár alján */
        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 1rem;
            font-weight: 600;
        }

        .cart-total span:last-child {
            font-family: var(--font-display);
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Törlés gomb egy kosár tételnél */
        .remove-item-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-faint);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .remove-item-btn:hover {
            color: var(--danger);
            background: var(--danger-soft);
        }

        /* Megjegyzés beviteli mező az étel alatt */
        .item-note {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            padding: 6px 10px;
            resize: none;           /* Ne lehessen átméretezni */
            height: 42px;
        }

        .item-note::placeholder {
            color: var(--text-faint);
        }

        /* Mennyiség számláló (+/-) */
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            color: var(--text);
            width: 28px;
            height: 28px;
            border-radius: 50%;   /* Kerek gomb */
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .qty-btn:hover {
            border-color: var(--primary);
            color: var(--primary-hover);
        }

        .qty-display {
            font-family: var(--font-display);
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        /* ============================================================
           RENDELÉS KÜLDÉSE GOMB
        ============================================================ */
        .send-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-md);
            color: var(--on-primary);
            font-size: 1.05rem;
            font-weight: 700;
            padding: 16px;
            cursor: pointer;
            margin-top: 14px;
            transition: background 0.2s;
            letter-spacing: 0.5px;
        }

        .send-btn:hover { background: var(--primary-hover); }
        .send-btn:disabled {
            background: var(--bg-elevated-2);
            color: var(--text-faint);
            cursor: not-allowed;
        }

        /* ============================================================
           RENDELÉSEK LISTÁJA (jobb panel)
        ============================================================ */
        .panel-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        /* Egy rendelés kártya */
        .order-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);  /* Bal szegély = ÚJ */
            box-shadow: var(--shadow-card);
            position: relative;
        }

        /* Kész rendelésnél zöld szegély */
        .order-card.done {
            border-left-color: var(--success);
            opacity: 0.6;           /* Kicsit elhalványul ha kész */
        }

        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .order-queue {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-hover);
        }

        .order-card.done .order-queue {
            color: var(--success);
        }

        .order-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-new {
            background: var(--primary-soft);
            color: var(--primary-hover);
            border: 1px solid var(--primary);
        }

        .status-done {
            background: rgba(46, 204, 113, 0.14);
            color: var(--success);
            border: 1px solid var(--success);
        }

        /* Egy étel sor a rendelésen belül */
        .order-item-line {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            font-size: 1.1rem;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
        }

        .order-item-line .order-item-note {
            width: 100%;
        }

        .order-item-line:last-child {
            border-bottom: none;
        }

        .order-item-note {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-style: italic;
        }

        .order-item-price {
            font-family: var(--font-display);
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Rendelés végösszege az order kártyán */
        .order-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            padding: 8px 0 4px;
            margin-top: 4px;
            border-top: 1px solid var(--border);
        }

        .order-total span:last-child {
            font-family: var(--font-display);
            color: var(--gold);
        }

        /* Törlés gomb a rendelés kártyán */
        .delete-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            background: none;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            padding: 8px 10px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.15s;
        }

        .delete-btn:hover {
            background: var(--danger-soft);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Ha nincs rendelés */
        .empty-state {
            text-align: center;
            color: var(--text-faint);
            padding: 40px 20px;
            font-size: 0.9rem;
        }

        /* ============================================================
           NAPI STATISZTIKA GOMB
        ============================================================ */
        .stats-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-muted);
            padding: 11px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 10px;
            transition: all 0.15s;
        }

        .stats-btn:hover {
            border-color: var(--primary);
            color: var(--primary-hover);
        }

        /* ============================================================
           MODAL (felugró ablak) - Statisztikához és Beállításokhoz
        ============================================================ */
        .modal-overlay {
            display: none;          /* Alapesetben rejtett */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(4, 4, 7, 0.75);
            backdrop-filter: blur(3px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        /* display: flex → láthatóvá teszi a modalt */
        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-strong);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            display: flex;
            align-items: center;
            gap: 9px;
            font-family: var(--font-display);
            color: var(--primary-hover);
            margin-bottom: 16px;
            font-size: 1.05rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .stat-row:last-child { border-bottom: none; }
        .stat-value {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--gold);
        }

        .modal-close {
            width: 100%;
            background: var(--bg-elevated-2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 12px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 0.95rem;
            transition: all 0.15s;
        }

        .modal-close:hover {
            border-color: var(--primary);
            color: var(--primary-hover);
        }

        /* Napi statisztika nullázása gomb – visszafogottabb, mint a Bezárás */
        .reset-stats-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: none;
            border: 1px solid var(--danger);
            border-radius: var(--radius-sm);
            color: var(--danger);
            padding: 10px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 0.85rem;
            transition: all 0.15s;
        }

        .reset-stats-btn:hover {
            background: var(--danger-soft);
        }

        /* ============================================================
           MODAL - Beállítások (étlap tétel hozzáadása/törlése)
        ============================================================ */
        .add-item-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .add-item-form input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            padding: 10px;
        }

        .add-item-form input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .add-item-form input::placeholder {
            color: var(--text-faint);
        }

        .add-item-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--success);
            border: none;
            border-radius: var(--radius-sm);
            color: #0a1f14;
            font-weight: 700;
            padding: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.15s;
        }

        .add-item-btn:hover {
            background: var(--success-strong);
        }

        .menu-manage-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .menu-manage-row:last-child { border-bottom: none; }

        .menu-manage-price {
            font-family: var(--font-display);
            color: var(--gold);
            margin-right: 10px;
            font-weight: 600;
        }

        .menu-manage-delete {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-faint);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .menu-manage-delete:hover {
            color: var(--danger);
            background: var(--danger-soft);
        }
    </style>
</head>
<body>

<!-- FEJLÉC -->
<header>
    <div class="header-title">
        <span data-icon="bag" data-icon-size="20"></span>
        <h1>PÉNZTÁR</h1>
    </div>
    <div class="header-actions">
        <span class="order-count" id="orderCount">0 rendelés</span>
        <button class="icon-btn" onclick="openSettings()" aria-label="Étlap beállítása" title="Étlap beállítása">
            <span data-icon="gear" data-icon-size="20"></span>
        </button>
    </div>
</header>

<!-- FŐ ELRENDEZÉS -->
<div class="main-layout">

    <!-- ============================================================
         BAL PANEL: ÚJ RENDELÉS ÖSSZERAKÁSA
    ============================================================ -->
    <div class="left-panel">

        <!-- Pager sorszám választó (16 gomb) -->
        <div class="order-header">
            <label><span data-icon="bell" data-icon-size="14"></span> Pager sorszám – válassz egyet</label>
            <div class="pager-grid">
                <!-- Array.from({length: 16}) → létrehoz egy 16 elemű tömböt
                     Ebből generáljuk a 16 gombot JavaScript-tel -->
            </div>
            <div class="selected-queue" id="selectedQueueDisplay">
                Még nincs sorszám kiválasztva
            </div>
        </div>

        <!--
          MENÜ GOMBOK
          =============================================================
          Az étlap a Firebase "menu" ágából töltődik be (lásd renderMenu()
          a JS részben), NEM itt van hardkódolva.

          Új tétel felvétele / meglévő törlése: a fejléc fogaskerék
          ikonja → Étlap beállítása.
          =============================================================
        -->

        <p class="category-title">Kaják</p>
        <div class="menu-grid" id="menuGrid"></div>

        <!-- KOSÁR: az összerakott rendelés -->
        <div class="cart-section">
            <h3><span data-icon="cart" data-icon-size="16"></span> Aktuális rendelés</h3>
            <!-- ide kerülnek a kosár tételek JavaScript-ből -->
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
        </div>

        <!-- Küldés gomb -->
        <button class="send-btn" id="sendBtn" onclick="sendOrder()">
            <span data-icon="send" data-icon-size="18"></span> RENDELÉS KÜLDÉSE
        </button>

    </div>

    <!-- ============================================================
         JOBB PANEL: AKTÍV RENDELÉSEK LISTÁJA
    ============================================================ -->
    <div class="right-panel">
        <p class="panel-title"><span data-icon="clipboardList" data-icon-size="16"></span> Aktív rendelések</p>

        <!-- ide kerülnek a rendelés kártyák JavaScript-ből -->
        <div id="ordersList"></div>

        <!-- Napi statisztika gomb -->
        <button class="stats-btn" onclick="showStats()">
            <span data-icon="chart" data-icon-size="16"></span> Napi statisztika megtekintése
        </button>
    </div>

</div>

<!-- ============================================================
     STATISZTIKA MODAL (felugró ablak)
============================================================ -->
<div class="modal-overlay" id="statsModal">
    <div class="modal">
        <h2><span data-icon="chart" data-icon-size="18"></span> Mai nap statisztikája</h2>
        <div id="statsContent"></div>
        <button class="reset-stats-btn" onclick="resetStats()"><span data-icon="trash" data-icon-size="16"></span> Statisztika nullázása</button>
        <button class="modal-close" onclick="closeStats()">Bezárás</button>
    </div>
</div>

<!-- ============================================================
     BEÁLLÍTÁSOK MODAL (felugró ablak) - étlap tétel hozzáadása/törlése
============================================================ -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2><span data-icon="gear" data-icon-size="18"></span> Étlap beállítása</h2>

        <div class="add-item-form">
            <input type="text" id="newItemName" placeholder="Étel neve (pl. Sajtos Pita)" maxlength="59" />
            <input type="number" id="newItemPrice" placeholder="Ár (din)" min="0" max="100000" />
            <button class="add-item-btn" onclick="addMenuItem()"><span data-icon="plus" data-icon-size="16"></span> Hozzáadás az étlaphoz</button>
        </div>

        <div id="menuManageList"></div>

        <button class="modal-close" onclick="closeSettings()">Bezárás</button>
    </div>
</div>


<!-- ============================================================
     JAVASCRIPT – Az alkalmazás logikája
============================================================ -->
<script src="firebase-config.js"></script>
<script>
    // ============================================================
    // ÁLLAPOT (state) – az alkalmazás "memóriája"
    // ============================================================

    let cart = [];
    let orders = {};
    let selectedQueue = null;  // A kiválasztott pager sorszáma (1-16)
    let dailyStats = { orderCount: 0, doneCount: 0, items: {} };  // Tartósan tárolt napi statisztika
    let menuItems = {};  // Az étlap Firebase-ből: { itemId: { name, price } }

    // ============================================================
    // KEZDETI ÉTLAP – csak akkor kerül fel a Firebase "menu" ágába,
    // ha az még teljesen üres (első indításkor). Utána az étlapot
    // kizárólag az Étlap beállítása modal kezeli.
    // ============================================================
    const DEFAULT_MENU_ITEMS = {
        "Dupli Cheeseburger": 2200,
        "Cheeseburger": 1800,
        "Gyros Pita": 1900,
        "Gyros Box": 2400,
        "Pulled Pork": 2300,
        "Pulled Chicken": 2100,
        "Pljeskavica": 2000,
        "Pomfrit": 900
    };


    // ============================================================
    // PAGER GOMBOK GENERÁLÁSA
    // Ez lefut egyszer, az oldal betöltésekor.
    // 16 gombot hoz létre (1-től 16-ig) és berakja a .pager-grid-be.
    // ============================================================
    function renderPagerButtons() {
        const grid = document.querySelector(".pager-grid");

        // Összegyűjtjük a FOGLALT pager számokat az aktív rendelésekből.
        // Object.values(orders) → az orders objektum értékeit adja vissza tömbként
        // .map(o => o.queue) → minden rendelésből csak a pager számát vesszük ki
        // Eredmény pl.: [3, 7, 12] ha ezek a pagerek ki vannak adva
        const occupiedPagers = Object.values(orders).map(o => o.queue);

        // Array.from({length: 16}, (_, i) => i + 1) → [1, 2, 3, ..., 16]
        grid.innerHTML = Array.from({length: 16}, (_, i) => i + 1)
            .map(num => {
                const isSelected = selectedQueue === num;
                const isOccupied = occupiedPagers.includes(num);  // Foglalt-e ez a pager?

                // Ha foglalt ÉS nem ez a kiválasztott (ami küldés előtt van)
                // akkor szürke és nem kattintható
                if (isOccupied && !isSelected) {
                    return `
              <button
                class="pager-btn occupied"
                disabled
                title="#${num} pager már ki van adva"
              >${num}</button>
            `;
                }

                // Szabad vagy éppen kiválasztott pager → normál gomb
                return `
            <button
              class="pager-btn ${isSelected ? 'selected' : ''}"
              onclick="selectPager(${num})"
            >${num}</button>
          `;
            }).join("");
    }


    // ============================================================
    // PAGER KIVÁLASZTÁSA
    // num: a megnyomott gomb száma (1-16)
    // ============================================================
    function selectPager(num) {
        // Ellenőrzés: foglalt-e ez a pager?
        // (Biztonsági check, bár a disabled gomb elvileg nem kattintható)
        const occupiedPagers = Object.values(orders).map(o => o.queue);
        if (occupiedPagers.includes(num)) {
            alert(`A #${num} pager már ki van adva! Várj amíg visszahozzák.`);
            return;
        }

        // Ha ugyanazt nyomja meg újra, töröljük a kiválasztást
        if (selectedQueue === num) {
            selectedQueue = null;
            document.getElementById("selectedQueueDisplay").innerHTML =
                "Még nincs sorszám kiválasztva";
        } else {
            selectedQueue = num;
            document.getElementById("selectedQueueDisplay").innerHTML =
                `Kiválasztott pager: <span>#${num}</span>`;
        }

        // Újrarajzoljuk a gombokat, hogy a kiválasztott kiemelve legyen
        renderPagerButtons();
    }


    // ============================================================
    // ÉTLAP GOMBOK GENERÁLÁSA
    // A menuItems (Firebase "menu" ág) alapján rajzolja ki a
    // menügombokat. Lefut minden real-time frissüléskor is, hogy az
    // étlap mindkét tableten (illetve minden nyitott lapon) azonnal
    // frissüljön, ha valaki hozzáad vagy töröl egy tételt.
    // ============================================================
    function renderMenu() {
        const grid = document.getElementById("menuGrid");

        const items = Object.values(menuItems);
        if (items.length === 0) {
            grid.innerHTML = '<p style="color:var(--text-faint);font-size:0.85rem;">Még nincs felvéve étlap tétel. Add hozzá a fejléc fogaskerék ikonjával!</p>';
            return;
        }

        grid.innerHTML = items.map(item => `
        <button class="menu-btn" data-name="${item.name}" onclick="addToCart('${item.name.replace(/'/g, "\\'")}')">
            <span class="menu-btn-name">${item.name}</span>
            <span class="menu-btn-price">${item.price} din</span>
        </button>
      `).join("");

        // A kosárban lévő tételek kiemelése (pl. étlap-frissítés után is)
        cart.forEach(cartItem => {
            document.querySelectorAll(`.menu-btn[data-name="${cartItem.name}"]`)
                .forEach(btn => btn.classList.add("in-cart"));
        });

        hydrateIcons();
    }


    // ============================================================
    // ÉTEL HOZZÁADÁSA A KOSÁRHOZ
    // Ezt hívja meg minden menü gomb kattintáskor.
    // ============================================================
    function addToCart(itemName) {
        // Megnézzük, hogy az étel már szerepel-e a kosárban
        const existing = cart.find(i => i.name === itemName);

        // Az árat a jelenlegi étlapból (menuItems) keressük ki
        const menuItem = Object.values(menuItems).find(i => i.name === itemName);

        if (existing) {
            // Ha már benne van, növeljük a mennyiségét
            existing.qty += 1;
        } else {
            // Ha még nincs benne, hozzáadjuk (az árát az étlapból vesszük)
            cart.push({ name: itemName, qty: 1, note: "", price: menuItem ? menuItem.price : 0 });
        }

        // Frissítjük a kosár megjelenítést
        renderCart();
    }


    // ============================================================
    // KOSÁR MEGJELENÍTÉSE
    // Ez rajzolja ki a képernyőre az aktuális kosár tartalmát.
    // ============================================================
    function renderCart() {
        const container = document.getElementById("cartItems");

        // Ha üres a kosár
        if (cart.length === 0) {
            container.innerHTML = '<p style="color:var(--text-faint);font-size:0.85rem;">Még nincs tétel a kosárban.</p>';
            document.getElementById("cartTotal").innerHTML = "";
            // Menü gombok visszaállítása (egyik sem kiemelve)
            document.querySelectorAll(".menu-btn").forEach(btn => btn.classList.remove("in-cart"));
            return;
        }

        // Kiemeljük azokat a menü gombokat, amik a kosárban vannak
        document.querySelectorAll(".menu-btn").forEach(btn => {
            const inCart = cart.some(i => i.name === btn.dataset.name);
            btn.classList.toggle("in-cart", inCart);
        });

        // Minden kosár tételt kirajtolunk
        // cart.map() → végigmegy a tömbön és minden elemből HTML-t csinál
        // .join("") → az elemeket összefűzi egy szöveggé
        container.innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <div class="cart-item-header">
            <span class="cart-item-name">${item.name}</span>
            <button class="remove-item-btn" onclick="removeFromCart(${index})" aria-label="Tétel eltávolítása" data-icon="close" data-icon-size="14"></button>
          </div>

          <div class="cart-item-header">
            <span class="cart-item-price">${item.price} din / db</span>
            <span class="cart-item-line-total">${item.price * item.qty} din</span>
          </div>

          <!-- Mennyiség +/- kezelő -->
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            <span class="qty-display">${item.qty} db</span>
            <button class="qty-btn" onclick="changeQty(${index}, +1)">+</button>
          </div>

          <!-- Megjegyzés mező
               oninput → azonnal menti amit beírunk (nem kell Enter)
               A ${index} megmondja, melyik tételhez tartozik a megjegyzés -->
          <textarea
            class="item-note"
            placeholder="Megjegyzés (pl. hagyma nélkül)..."
            oninput="updateNote(${index}, this.value)"
          >${item.note}</textarea>
        </div>
      `).join("");

        // Végösszeg kiszámítása: minden tétel ára × mennyisége, összeadva
        const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
        document.getElementById("cartTotal").innerHTML = `
        <span>Végösszeg:</span>
        <span>${total} din</span>
      `;

        hydrateIcons();
    }


    // ============================================================
    // MENNYISÉG VÁLTOZTATÁSA (+/-)
    // index: melyik tételt változtatjuk (0, 1, 2, ...)
    // delta: +1 vagy -1
    // ============================================================
    function changeQty(index, delta) {
        cart[index].qty += delta;

        // Ha 0-ra csökkenne, töröljük a tételt
        if (cart[index].qty <= 0) {
            removeFromCart(index);
        } else {
            renderCart();
        }
    }


    // ============================================================
    // MEGJEGYZÉS FRISSÍTÉSE
    // index: melyik tétel megjegyzése változott
    // value: az új szöveg
    // ============================================================
    function updateNote(index, value) {
        cart[index].note = value;
        // Nem kell renderCart() mert a szöveg már ott van a mezőben
    }


    // ============================================================
    // TÉTEL ELTÁVOLÍTÁSA A KOSÁRBÓL
    // splice(index, 1) → kitöröl 1 elemet az adott pozícióból
    // ============================================================
    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }


    // ============================================================
    // RENDELÉS ELKÜLDÉSE FIREBASE-BE
    // ============================================================
    function sendOrder() {
        // Ellenőrzések: pager kiválasztva és kosár nem üres
        if (!selectedQueue) {
            alert("Kérlek válassz pager sorszámot!");
            return;
        }

        if (cart.length === 0) {
            alert("A kosár üres, adj hozzá ételeket!");
            return;
        }

        // Rendelés objektum összeállítása
        const order = {
            queue: selectedQueue,     // Kiválasztott pager száma
            items: cart,              // Ételek listája
            status: "new",            // Állapot: "new" = Új
            timestamp: Date.now()     // Időbélyeg
        };

        // Küldés Firebase-be
        ordersRef.push(order)
            .then(() => {
                // Napi statisztika frissítése: rendelésszám + tételek darabszáma
                // nő. Ez a rendelés törlésétől függetlenül megmarad, egészen
                // amíg valaki rá nem nyom a "Statisztika nullázása" gombra.
                const statsUpdates = {
                    orderCount: firebase.database.ServerValue.increment(1)
                };
                cart.forEach(item => {
                    statsUpdates[`items/${item.name}`] =
                        firebase.database.ServerValue.increment(item.qty);
                });
                statsRef.update(statsUpdates);

                // Sikeres küldés után visszaállítunk mindent
                cart = [];
                selectedQueue = null;
                document.getElementById("selectedQueueDisplay").innerHTML =
                    "Még nincs sorszám kiválasztva";
                renderPagerButtons();   // Gombok visszaállítása (egyik sem kijelölt)
                renderCart();
            })
            .catch(err => {
                alert("Hiba a küldés során: " + err.message);
            });
    }


    // ============================================================
    // RENDELÉS TÖRLÉSE
    // orderId: a Firebase által generált egyedi azonosító (pl. "-Nab123")
    // ============================================================
    function deleteOrder(orderId) {
        // Megerősítés kérése törlés előtt
        if (!confirm("Biztosan törli ezt a rendelést?")) return;

        // remove() → törli az adott rendelést Firebase-ből
        // Ez automatikusan szinkronizálódik a szakácsos tabletre is!
        ordersRef.child(orderId).remove();
    }


    // ============================================================
    // RENDELÉSEK LISTÁJÁNAK MEGJELENÍTÉSE (jobb panel)
    // ============================================================
    function renderOrders() {
        const container = document.getElementById("ordersList");

        // Az orders objektumból kulcsokat (ID-kat) kivesszük
        const orderKeys = Object.keys(orders);

        // Számlálót frissítjük a fejlécben
        document.getElementById("orderCount").textContent =
            orderKeys.length + " rendelés";

        if (orderKeys.length === 0) {
            container.innerHTML = '<p class="empty-state">Jelenleg nincs aktív rendelés.</p>';
            return;
        }

        // Rendezés: legújabb elöl (timestamp alapján)
        orderKeys.sort((a, b) => orders[b].timestamp - orders[a].timestamp);

        container.innerHTML = orderKeys.map(id => {
            const order = orders[id];
            const isDone = order.status === "done";

            return `
          <div class="order-card ${isDone ? 'done' : ''}">
            <div class="order-card-header">
              <span class="order-queue">#${order.queue}</span>
              <span class="order-status ${isDone ? 'status-done' : 'status-new'}">
                ${isDone ? icon('checkCircle', 13) + ' KÉSZ' : '<span class="status-dot"></span> ÚJ'}
              </span>
            </div>

            <!-- Ételek listája a rendelésen belül -->
            ${order.items.map(item => `
              <div class="order-item-line">
                <strong>${item.qty}× ${item.name}</strong>
                <span class="order-item-price">${(item.price || 0) * item.qty} din</span>
                ${item.note ? `<div class="order-item-note">${icon('pencil', 12)} ${item.note}</div>` : ''}
              </div>
            `).join("")}

            <!-- Rendelés végösszege -->
            <div class="order-total">
              <span>Végösszeg:</span>
              <span>${order.items.reduce((sum, item) => sum + (item.price || 0) * item.qty, 0)} din</span>
            </div>

            <!-- Törlés gomb (csak a pénztáros tableten van) -->
            <button class="delete-btn" onclick="deleteOrder('${id}')">
              <span data-icon="trash" data-icon-size="14"></span> Rendelés törlése
            </button>
          </div>
        `;
        }).join("");

        hydrateIcons();
    }


    // ============================================================
    // VALÓS IDEJŰ SZINKRON BEÁLLÍTÁSA
    //
    // Az "on('value', ...)" folyamatosan "figyeli" a Firebase-t.
    // Minden változáskor (új rendelés, törlés, státusz változás)
    // automatikusan lefut a callback függvény, és frissíti a képernyőt.
    // Ez az, ami miatt a két tablet szinkronban van!
    // ============================================================
    // A listenereket csak a névtelen bejelentkezés sikeres létrejötte után
    // kapcsoljuk be – a security rules hitelesítést követelnek meg, enélkül
    // a lekérdezés "permission denied" hibával elutasítódna.
    firebase.auth().onAuthStateChanged((user) => {
        if (!user) return;

        ordersRef.on("value", (snapshot) => {
            // snapshot.val() → az adatbázisból jövő adat
            orders = snapshot.val() || {};  // Ha null (üres), legyen üres objektum
            renderOrders();
            // Pager gombokat is frissítjük, mert változhattak a foglalt pagerek
            // Pl. ha töröltek egy rendelést, az a pager újra szabad lesz
            renderPagerButtons();
        });

        // A tartósan tárolt napi statisztikát is folyamatosan figyeljük,
        // hogy a modal mindig a legfrissebb adatot mutassa.
        statsRef.on("value", (snapshot) => {
            dailyStats = snapshot.val() || { orderCount: 0, doneCount: 0, items: {} };
        });

        // Az étlapot (menu) is folyamatosan figyeljük, hogy real-time
        // frissüljön minden nyitott lapon, ha valaki hozzáad/töröl egy
        // tételt. Első indításkor, ha az ág teljesen üres, egyszeri
        // jelleggel feltöltjük az alapértelmezett tételekkel.
        menuRef.once("value").then((snapshot) => {
            if (!snapshot.exists()) {
                const seed = {};
                Object.entries(DEFAULT_MENU_ITEMS).forEach(([name, price]) => {
                    const key = menuRef.push().key;
                    seed[key] = { name, price };
                });
                return menuRef.set(seed);
            }
        }).finally(() => {
            menuRef.on("value", (snapshot) => {
                menuItems = snapshot.val() || {};
                renderMenu();
                renderCart();               // árak/gombok újraszinkronizálása
                renderMenuSettingsList();    // ha a beállítások modal nyitva van
            });
        });
    });


    // ============================================================
    // NAPI STATISZTIKA
    // ============================================================
    function showStats() {
        const orderCount = dailyStats.orderCount || 0;
        const doneCount = dailyStats.doneCount || 0;
        const items = dailyStats.items || {};

        // Rendezés: legtöbbet rendelt étel előre
        const sorted = Object.entries(items)
            .sort((a, b) => b[1] - a[1]);  // b[1] - a[1] → csökkenő sorrend

        // HTML összeállítása a modalhoz
        let html = `
        <div class="stat-row">
          <span>Összes rendelés ma:</span>
          <span class="stat-value">${orderCount} db</span>
        </div>
        <div class="stat-row">
          <span>Ebből teljesített:</span>
          <span class="stat-value">${doneCount} db</span>
        </div>
        <p style="color:var(--text-muted);font-size:0.75rem;margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px;">
          Eladott ételek
        </p>
      `;

        if (sorted.length === 0) {
            html += '<p style="color:var(--text-faint);font-size:0.85rem;">Ma még nincs rendelés.</p>';
        } else {
            sorted.forEach(([name, count]) => {
                html += `
            <div class="stat-row">
              <span>${name}</span>
              <span class="stat-value">${count} db</span>
            </div>
          `;
            });
        }

        document.getElementById("statsContent").innerHTML = html;
        document.getElementById("statsModal").classList.add("open");
    }

    // ============================================================
    // NAPI STATISZTIKA NULLÁZÁSA
    // A tárolt statisztikát (rendelésszám, teljesített darabszám,
    // eladott ételek) visszaállítja nulláára. Az aktív rendeléseket
    // (orders lista) NEM érinti.
    // ============================================================
    function resetStats() {
        if (!confirm("Biztosan nullázod a napi statisztikát? Ez nem vonható vissza.")) return;

        statsRef.set({ orderCount: 0, doneCount: 0, items: {} })
            .then(() => showStats());  // Modal tartalmának azonnali frissítése
    }

    function closeStats() {
        document.getElementById("statsModal").classList.remove("open");
    }

    // ============================================================
    // ÉTLAP BEÁLLÍTÁSA (tétel hozzáadása / törlése)
    // ============================================================
    function openSettings() {
        renderMenuSettingsList();
        document.getElementById("settingsModal").classList.add("open");
    }

    function closeSettings() {
        document.getElementById("settingsModal").classList.remove("open");
    }

    // Az étlap kezelő lista kirajzolása a Beállítások modalban
    // (minden meglévő tétel neve, ára és egy törlés gomb).
    function renderMenuSettingsList() {
        const container = document.getElementById("menuManageList");
        if (!container) return;  // a modal még nincs a DOM-ban (nem várt eset)

        const entries = Object.entries(menuItems);
        if (entries.length === 0) {
            container.innerHTML = '<p style="color:var(--text-faint);font-size:0.85rem;">Még nincs felvéve étlap tétel.</p>';
            return;
        }

        container.innerHTML = entries.map(([id, item]) => `
        <div class="menu-manage-row">
          <span>${item.name}</span>
          <span style="display:flex;align-items:center;">
            <span class="menu-manage-price">${item.price} din</span>
            <button class="menu-manage-delete" onclick="deleteMenuItem('${id}')" aria-label="Tétel törlése" data-icon="close" data-icon-size="14"></button>
          </span>
        </div>
      `).join("");

        hydrateIcons();
    }

    // Új tétel felvétele az étlapra a Beállítások modal formjából
    function addMenuItem() {
        const nameInput = document.getElementById("newItemName");
        const priceInput = document.getElementById("newItemPrice");

        const name = nameInput.value.trim();
        const price = Number(priceInput.value);

        if (!name) {
            alert("Add meg az étel nevét!");
            return;
        }
        if (!Number.isFinite(price) || price < 0 || price > 100000) {
            alert("Adj meg egy érvényes árat (0 és 100000 din között)!");
            return;
        }

        // Duplikáció elkerülése: figyelmeztetünk, ha már van ilyen nevű tétel
        const alreadyExists = Object.values(menuItems).some(
            item => item.name.toLowerCase() === name.toLowerCase()
        );
        if (alreadyExists) {
            alert("Már van ilyen nevű tétel az étlapon!");
            return;
        }

        menuRef.push({ name, price })
            .then(() => {
                nameInput.value = "";
                priceInput.value = "";
                nameInput.focus();
            })
            .catch(err => {
                alert("Hiba a tétel hozzáadása során: " + err.message);
            });
    }

    // Tétel törlése az étlapról (a Beállítások modal listájából)
    function deleteMenuItem(itemId) {
        const item = menuItems[itemId];
        const name = item ? item.name : "ez a tétel";
        if (!confirm(`Biztosan törlöd az étlapról: "${name}"?`)) return;

        menuRef.child(itemId).remove();
    }

    // Kezdeti renderelés (oldal betöltésekor)
    renderPagerButtons();  // 16 pager gomb megjelenítése
    renderCart();          // Üres kosár megjelenítése
    hydrateIcons();         // Statikus fejléc/gomb ikonok kirajzolása
</script>
</body>
</html>
