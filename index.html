<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pénztár – Rendelésfelvitel</title>

    <!--
      PWA beállítások: ezek teszik lehetővé, hogy a böngészőből
      "telepítsük" az alkalmazást, és teljes képernyőn fusson.
    -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a0f" />

    <!--
      Firebase SDK betöltése (a Google szervereiről)
      Ez a három sor tölti be a Firebase könyvtárakat,
      amik nélkül nem tudna szinkronizálni a két tablet.
    -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Egységes SVG ikon-készlet (emoji helyett) -->
    <script src="icons.js"></script>

    <!-- Betűtípusok: Outfit (kiemelések, számok, árak) + Rubik (törzsszöveg, gombok) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!--
      Mentett téma (sötét/világos) alkalmazása MÉG az első kirajzolás
      előtt, hogy világos módban ne villanjon fel a sötét felület.
    -->
    <script>
        (function () {
            try {
                if (localStorage.getItem("foodtruckTheme") === "light") {
                    document.documentElement.dataset.theme = "light";
                }
            } catch (err) { /* localStorage nélkül a sötét mód marad */ }
        })();
    </script>

    <!-- Stílusok külön fájlban: index.css (tartalomjegyzék a fájl elején) -->
    <link rel="stylesheet" href="index.css" />
</head>
<body>

<!-- FEJLÉC -->
<header>
    <div class="header-title">
        <span data-icon="bag" data-icon-size="20"></span>
        <h1>PÉNZTÁR</h1>
    </div>
    <div class="header-actions">
        <span class="order-count" id="orderCount">0 rendelés</span>
        <button class="icon-btn" onclick="openSettings()" aria-label="Beállítások" title="Beállítások">
            <span data-icon="gear" data-icon-size="20"></span>
        </button>
    </div>
</header>

<!-- FŐ ELRENDEZÉS -->
<div class="main-layout">

    <!-- ============================================================
         BAL PANEL: ÚJ RENDELÉS ÖSSZERAKÁSA
    ============================================================ -->
    <div class="left-panel">

        <!-- Pager sorszám választó (16 gomb) -->
        <div class="order-header">
            <label><span data-icon="bell" data-icon-size="14"></span> Pager sorszám – válassz egyet</label>
            <div class="pager-grid">
                <!-- Array.from({length: 16}) → létrehoz egy 16 elemű tömböt
                     Ebből generáljuk a 16 gombot JavaScript-tel -->
            </div>
            <div class="selected-queue" id="selectedQueueDisplay">
                Még nincs sorszám kiválasztva
            </div>
        </div>

        <!--
          MENÜ GOMBOK
          =============================================================
          Az étlap a Firebase "menu" ágából töltődik be (lásd renderMenu()
          a JS részben), NEM itt van hardkódolva.

          Új tétel felvétele / meglévő törlése: a fejléc fogaskerék
          ikonja → Étlap beállítása.
          =============================================================
        -->

        <p class="category-title">Ételek</p>
        <div class="menu-grid" id="menuGridFood"></div>

        <!-- Italok szekció – csak akkor látszik, ha van ital az étlapon.
             Az italok a rendeléssel együtt mentődnek és a statisztikába
             is bekerülnek, de a konyhai kijelzőn NEM jelennek meg
             (a szakácsnak nincs velük dolga, a pénztáros adja ki őket). -->
        <div id="drinksSection" style="display:none;">
            <p class="category-title">Italok</p>
            <div class="menu-grid" id="menuGridDrinks"></div>
        </div>

        <!-- KOSÁR: az összerakott rendelés -->
        <div class="cart-section">
            <h3><span data-icon="cart" data-icon-size="16"></span> Aktuális rendelés</h3>
            <!-- ide kerülnek a kosár tételek JavaScript-ből -->
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
        </div>

        <!-- Küldés gomb -->
        <button class="send-btn" id="sendBtn" onclick="sendOrder()">
            <span data-icon="send" data-icon-size="18"></span> RENDELÉS KÜLDÉSE
        </button>

    </div>

    <!-- ============================================================
         JOBB PANEL: AKTÍV RENDELÉSEK LISTÁJA
    ============================================================ -->
    <div class="right-panel">
        <p class="panel-title"><span data-icon="clipboardList" data-icon-size="16"></span> Aktív rendelések</p>

        <!-- ide kerülnek a rendelés kártyák JavaScript-ből -->
        <div id="ordersList"></div>

        <!-- Napi statisztika gomb -->
        <button class="stats-btn" onclick="showStats()">
            <span data-icon="chart" data-icon-size="16"></span> Napi statisztika megtekintése
        </button>
    </div>

</div>

<!-- ============================================================
     STATISZTIKA MODAL (felugró ablak)
============================================================ -->
<div class="modal-overlay" id="statsModal">
    <div class="modal">
        <h2><span data-icon="chart" data-icon-size="18"></span> Mai nap statisztikája</h2>
        <div id="statsContent"></div>
        <button class="reset-stats-btn" onclick="resetStats()"><span data-icon="trash" data-icon-size="16"></span> Statisztika nullázása</button>
        <button class="modal-close" onclick="closeStats()">Bezárás</button>
    </div>
</div>

<!-- ============================================================
     BEÁLLÍTÁSOK MODAL (felugró ablak) - étlap tétel hozzáadása/törlése
============================================================ -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2><span data-icon="gear" data-icon-size="18"></span> Beállítások</h2>

        <!-- Téma (sötét/világos mód) váltó -->
        <p class="settings-section-title">Megjelenés</p>
        <div class="theme-toggle">
            <button class="theme-btn" id="themeBtnDark" onclick="setTheme('dark')">
                <span data-icon="moon" data-icon-size="16"></span> Sötét mód
            </button>
            <button class="theme-btn" id="themeBtnLight" onclick="setTheme('light')">
                <span data-icon="sun" data-icon-size="16"></span> Világos mód
            </button>
        </div>

        <p class="settings-section-title">Étlap</p>
        <div class="add-item-form">
            <input type="text" id="newItemName" placeholder="Tétel neve (pl. Sajtos Pita)" maxlength="59" />
            <input type="number" id="newItemPrice" placeholder="Ár (din)" min="1" max="100000" />
            <!-- Kategória: az Ital tételek nem jelennek meg a konyhán -->
            <select id="newItemCategory" aria-label="Kategória">
                <option value="food">Étel</option>
                <option value="drink">Ital</option>
            </select>
            <button class="add-item-btn" onclick="addMenuItem()"><span data-icon="plus" data-icon-size="16"></span> Hozzáadás az étlaphoz</button>
        </div>

        <div id="menuManageList"></div>

        <button class="modal-close" onclick="closeSettings()">Bezárás</button>
    </div>
</div>

<!-- ============================================================
     MEGERŐSÍTŐ MODAL (felugró ablak) - a natív confirm() helyett
     A natív confirm() blokkolja a renderelést (kioszk/PWA módban
     lefagyást okozhat), és nem illik az app sötét dizájnjához.
============================================================ -->
<div class="modal-overlay confirm-overlay" id="confirmModal">
    <div class="modal">
        <h2><span data-icon="trash" data-icon-size="18"></span> Megerősítés</h2>
        <p class="confirm-message" id="confirmMessage"></p>
        <div class="confirm-actions">
            <button class="confirm-cancel-btn" onclick="closeConfirm()">Mégse</button>
            <button class="confirm-danger-btn" id="confirmOkBtn" onclick="acceptConfirm()">Törlés</button>
        </div>
    </div>
</div>


<!-- ============================================================
     JAVASCRIPT – Az alkalmazás logikája
============================================================ -->
<script src="firebase-config.js"></script>
<script src="index.js"></script>
</body>
</html>
